<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EmployeeForwardSelector - Plain HTML Example</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 32px; color: #1f2937; }
  button.trigger { padding: 10px 20px; font-size: 14px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  pre { background: #f3f4f6; padding: 12px; border-radius: 4px; max-width: 640px; overflow: auto; }
</style>
</head>
<body>
  <h1>EmployeeForwardSelector - Plain HTML/JS Example</h1>
  <p>Click the button below to open the employee/action selection popup.</p>
  <button type="button" class="trigger" id="forwardBtn">Forward File</button>

  <h2>Last callback output</h2>
  <pre id="output">(none yet)</pre>

  <div id="employee-selector-root"></div>

  <script src="employee-forward-selector.js"></script>
  <script src="mock-data.js"></script>
  <script>
    var outputEl = document.getElementById("output");

    EmployeeForwardSelector.init({
      container: "#employee-selector-root",
      title: "Select Employee",
      subtitle: "Choose an employee and assign the forwarding action",
      preferredEmployees: EFSMockData.mockPreferredEmployees,
      predefinedEmployees: EFSMockData.mockPredefinedEmployees,
      searchEmployees: EFSMockData.mockSearchEmployees,
      onConfirm: function (data) {
        console.log("Selected employee and action:", data);
        outputEl.textContent = JSON.stringify(data, null, 2);
      },
      onCancel: function () {
        console.log("Employee selection cancelled");
        outputEl.textContent = JSON.stringify({ status: "cancelled" }, null, 2);
      }
    });

    document.getElementById("forwardBtn").addEventListener("click", function () {
      EmployeeForwardSelector.open();
    });
  </script>
</body>
</html>
